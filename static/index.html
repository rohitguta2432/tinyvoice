<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>tinyvoice — a tiny model that writes like me</title>
<style>
  :root {
    --bg: #faf8f4;
    --ink: #1c1917;
    --dim: #78716c;
    --accent: #6d28d9;
    --accent-soft: #ede9fe;
    --card: #ffffff;
    --edge: #e7e2da;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font: 16px/1.55 -apple-system, "SF Pro Text", Segoe UI, sans-serif;
    overflow-x: hidden;
  }
  /* soft pastel wash */
  .stage { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
  .blob {
    position: absolute; border-radius: 50%; filter: blur(70px); opacity: .55;
    animation: drift 22s ease-in-out infinite alternate;
  }
  .blob.a { width: 55vmax; height: 55vmax; left: -18vmax; top: -22vmax;
            background: radial-gradient(closest-side, #ddd3fb, transparent 70%); }
  .blob.b { width: 45vmax; height: 45vmax; right: -14vmax; top: -10vmax;
            background: radial-gradient(closest-side, #ffe3cf, transparent 70%);
            animation-delay: -8s; }
  @keyframes drift {
    from { transform: translateY(-3%) rotate(-2deg); }
    to   { transform: translateY(4%) rotate(3deg); }
  }

  main { max-width: 1060px; margin: 0 auto; padding: 56px 24px 80px; }

  header { text-align: center; animation: rise .8s cubic-bezier(.2,.8,.2,1) both; }
  .badge {
    display: inline-block; padding: 5px 14px; border-radius: 999px;
    border: 1px solid var(--edge); background: var(--card);
    color: var(--accent); font-size: 12.5px; letter-spacing: .14em;
    text-transform: uppercase; font-weight: 600;
    box-shadow: 0 1px 3px rgba(28,25,23,.05);
  }
  h1 {
    margin: 18px 0 10px; font-size: clamp(38px, 6vw, 64px); font-weight: 800;
    letter-spacing: -0.03em; color: var(--ink);
  }
  h1 em { font-style: normal; color: var(--accent); }
  .sub { color: var(--dim); font-size: clamp(15px, 2.2vw, 18px); }
  .sub b { color: var(--ink); font-weight: 650; }

  form {
    margin: 40px auto 0; max-width: 640px; display: flex; gap: 10px;
    animation: rise .8s .12s cubic-bezier(.2,.8,.2,1) both;
  }
  input {
    flex: 1; padding: 15px 18px; border-radius: 14px; border: 1px solid var(--edge);
    background: var(--card); color: var(--ink); font-size: 16px; outline: none;
    box-shadow: 0 1px 3px rgba(28,25,23,.05);
    transition: border-color .2s, box-shadow .2s;
  }
  input::placeholder { color: #a8a29e; }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
  button {
    padding: 15px 26px; border-radius: 14px; border: 0; cursor: pointer;
    font-size: 15.5px; font-weight: 700; color: #fff;
    background: linear-gradient(135deg, #7c3aed, var(--accent));
    transition: transform .15s, box-shadow .2s;
    box-shadow: 0 6px 20px rgba(109,40,217,.28);
  }
  button:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(109,40,217,.38); }
  button:disabled { opacity: .55; cursor: wait; transform: none; }

  .duel {
    display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 42px;
    animation: rise .8s .22s cubic-bezier(.2,.8,.2,1) both;
  }
  @media (max-width: 800px) { .duel { grid-template-columns: 1fr; } }
  .panel {
    border: 1px solid var(--edge); border-radius: 20px; background: var(--card);
    padding: 22px 24px; min-height: 340px;
    display: flex; flex-direction: column; position: relative; overflow: hidden;
    box-shadow: 0 1px 3px rgba(28,25,23,.05), 0 12px 32px -18px rgba(28,25,23,.12);
    transition: border-color .4s, box-shadow .4s;
  }
  .panel.mine.done {
    border-color: #c4b5fd;
    box-shadow: 0 1px 3px rgba(28,25,23,.05), 0 16px 44px -14px rgba(109,40,217,.28);
  }
  .panel h2 { font-size: 13px; letter-spacing: .12em; text-transform: uppercase;
              color: var(--dim); display: flex; align-items: center; gap: 8px; }
  .panel.mine h2 { color: var(--accent); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #d6d3d1; }
  .mine .dot { background: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
  .out {
    margin-top: 14px; white-space: pre-wrap; font-size: 14.5px; color: #44403c;
    flex: 1; overflow-y: auto; max-height: 52vh;
  }
  .out:empty::before { content: "…"; color: #d6d3d1; }
  .caret {
    display: inline-block; width: 8px; height: 17px; margin-left: 2px;
    background: var(--accent); vertical-align: -3px;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  @keyframes rise { from { opacity: 0; transform: translateY(22px); } }

  footer { margin-top: 40px; text-align: center; color: #a8a29e; font-size: 13px; }
  footer span { color: var(--dim); }
</style>
</head>
<body>
<div class="stage"><div class="blob a"></div><div class="blob b"></div></div>

<main>
  <header>
    <span class="badge">0.5B params · fine-tuned on 28 posts · runs on a laptop</span>
    <h1>tiny<em>voice</em></h1>
    <p class="sub">The same tiny model, twice. One is stock. One spent <b>an afternoon</b> reading my posts.</p>
  </header>

  <form id="f">
    <input id="topic" placeholder="give it a topic — e.g. why I run models on my Mac" autocomplete="off" required />
    <button id="go">Generate ⚡</button>
  </form>

  <div class="duel">
    <section class="panel base">
      <h2><span class="dot"></span> Stock model</h2>
      <div class="out" id="out-base"></div>
    </section>
    <section class="panel mine">
      <h2><span class="dot"></span> My voice</h2>
      <div class="out" id="out-mine"></div>
    </section>
  </div>

  <footer>trained with MLX on Apple silicon · no cloud, no GPU cluster · <span>weights stayed home</span></footer>
</main>

<script>
const $ = (id) => document.getElementById(id);

async function streamInto(voice, topic, el, panel) {
  el.textContent = "";
  panel.classList.remove("done");
  const caret = document.createElement("span");
  caret.className = "caret";
  el.after(caret);
  const res = await fetch("/api/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ voice, topic }),
  });
  const rd = res.body.getReader();
  const dec = new TextDecoder();
  let buf = "";
  for (;;) {
    const { done, value } = await rd.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split("\n\n");
    buf = lines.pop();
    for (const l of lines) {
      const d = l.replace(/^data: /, "");
      if (d === "[DONE]") continue;
      el.textContent += JSON.parse(d).token;
      el.scrollTop = el.scrollHeight;
    }
  }
  caret.remove();
  panel.classList.add("done");
}

$("f").addEventListener("submit", async (e) => {
  e.preventDefault();
  const topic = $("topic").value.trim();
  if (!topic) return;
  $("go").disabled = true;
  try {
    // sequential on purpose: one small GPU, and the reveal reads better
    await streamInto("base", topic, $("out-base"), document.querySelector(".panel.base"));
    await streamInto("mine", topic, $("out-mine"), document.querySelector(".panel.mine"));
  } finally {
    $("go").disabled = false;
  }
});
</script>
</body>
</html>
