<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>tinyvoice — a tiny model that writes like me</title>
<style>
  :root {
    --bg: #07060b;
    --ink: #ece9f4;
    --dim: #8b86a3;
    --accent: #a78bfa;
    --accent-hot: #c4b5fd;
    --glass: rgba(255, 255, 255, 0.045);
    --edge: rgba(255, 255, 255, 0.09);
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font: 16px/1.55 -apple-system, "SF Pro Text", Segoe UI, sans-serif;
    overflow-x: hidden;
  }
  /* aurora + starfield stage */
  .stage {
    position: fixed; inset: 0; z-index: -1; overflow: hidden;
  }
  .aurora {
    position: absolute; width: 130vmax; height: 130vmax;
    left: 50%; top: -80vmax; transform: translateX(-50%);
    background:
      radial-gradient(closest-side, rgba(167,139,250,.16), transparent 65%),
      radial-gradient(closest-side, rgba(99,102,241,.10) 20%, transparent 70%);
    animation: drift 26s ease-in-out infinite alternate;
    filter: blur(30px);
  }
  @keyframes drift {
    from { transform: translateX(-56%) rotate(-4deg); }
    to   { transform: translateX(-44%) rotate(5deg); }
  }
  .star { position: absolute; border-radius: 50%; background: #fff; opacity: .28;
          animation: twinkle 4s ease-in-out infinite; }
  @keyframes twinkle { 50% { opacity: .06; } }

  main { max-width: 1060px; margin: 0 auto; padding: 56px 24px 80px; }

  header { text-align: center; animation: rise .8s cubic-bezier(.2,.8,.2,1) both; }
  .badge {
    display: inline-block; padding: 5px 14px; border-radius: 999px;
    border: 1px solid var(--edge); background: var(--glass);
    color: var(--accent-hot); font-size: 12.5px; letter-spacing: .14em;
    text-transform: uppercase; backdrop-filter: blur(8px);
  }
  h1 {
    margin: 18px 0 10px; font-size: clamp(38px, 6vw, 64px); font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(180deg, #fff 30%, #b7aede);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .sub { color: var(--dim); font-size: clamp(15px, 2.2vw, 18px); }
  .sub b { color: var(--ink); font-weight: 600; }

  form {
    margin: 40px auto 0; max-width: 640px; display: flex; gap: 10px;
    animation: rise .8s .12s cubic-bezier(.2,.8,.2,1) both;
  }
  input {
    flex: 1; padding: 15px 18px; border-radius: 14px; border: 1px solid var(--edge);
    background: var(--glass); color: var(--ink); font-size: 16px; outline: none;
    backdrop-filter: blur(10px); transition: border-color .2s, box-shadow .2s;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(167,139,250,.15); }
  button {
    padding: 15px 26px; border-radius: 14px; border: 0; cursor: pointer;
    font-size: 15.5px; font-weight: 700; color: #14101f;
    background: linear-gradient(135deg, var(--accent-hot), var(--accent));
    transition: transform .15s, box-shadow .2s;
    box-shadow: 0 6px 24px rgba(167,139,250,.35);
  }
  button:hover { transform: translateY(-1px); box-shadow: 0 10px 32px rgba(167,139,250,.5); }
  button:disabled { opacity: .55; cursor: wait; transform: none; }

  .duel {
    display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 42px;
    animation: rise .8s .22s cubic-bezier(.2,.8,.2,1) both;
  }
  @media (max-width: 800px) { .duel { grid-template-columns: 1fr; } }
  .panel {
    border: 1px solid var(--edge); border-radius: 20px; background: var(--glass);
    backdrop-filter: blur(14px); padding: 22px 24px; min-height: 340px;
    display: flex; flex-direction: column; position: relative; overflow: hidden;
    transition: border-color .4s, box-shadow .4s;
  }
  .panel.mine.done {
    border-color: rgba(167,139,250,.55);
    box-shadow: 0 0 60px rgba(167,139,250,.14), inset 0 0 40px rgba(167,139,250,.05);
  }
  .panel h2 { font-size: 13px; letter-spacing: .12em; text-transform: uppercase;
              color: var(--dim); display: flex; align-items: center; gap: 8px; }
  .panel.mine h2 { color: var(--accent-hot); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); }
  .mine .dot { background: var(--accent); box-shadow: 0 0 12px var(--accent); }
  .out {
    margin-top: 14px; white-space: pre-wrap; font-size: 14.5px; color: #d9d5e8;
    flex: 1; overflow-y: auto; max-height: 52vh;
  }
  .out:empty::before { content: "…"; color: #3f3b52; }
  .caret {
    display: inline-block; width: 8px; height: 17px; margin-left: 2px;
    background: var(--accent); vertical-align: -3px;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  @keyframes rise { from { opacity: 0; transform: translateY(22px); } }

  footer { margin-top: 40px; text-align: center; color: #4d4863; font-size: 13px; }
  footer span { color: var(--dim); }
</style>
</head>
<body>
<div class="stage"><div class="aurora"></div></div>

<main>
  <header>
    <span class="badge">0.5B params · fine-tuned on 28 posts · runs on a laptop</span>
    <h1>tinyvoice</h1>
    <p class="sub">The same tiny model, twice. One is stock. One spent <b>an afternoon</b> reading my LinkedIn posts.</p>
  </header>

  <form id="f">
    <input id="topic" placeholder="give it a topic — e.g. why I run models on my Mac" autocomplete="off" required />
    <button id="go">Generate ⚡</button>
  </form>

  <div class="duel">
    <section class="panel base">
      <h2><span class="dot"></span> Stock model</h2>
      <div class="out" id="out-base"></div>
    </section>
    <section class="panel mine">
      <h2><span class="dot"></span> My voice</h2>
      <div class="out" id="out-mine"></div>
    </section>
  </div>

  <footer>trained with MLX on Apple silicon · no cloud, no GPU cluster · <span>weights stayed home</span></footer>
</main>

<script>
const $ = (id) => document.getElementById(id);

async function streamInto(voice, topic, el, panel) {
  el.textContent = "";
  panel.classList.remove("done");
  const caret = document.createElement("span");
  caret.className = "caret";
  el.after(caret);
  const res = await fetch("/api/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ voice, topic }),
  });
  const rd = res.body.getReader();
  const dec = new TextDecoder();
  let buf = "";
  for (;;) {
    const { done, value } = await rd.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split("\n\n");
    buf = lines.pop();
    for (const l of lines) {
      const d = l.replace(/^data: /, "");
      if (d === "[DONE]") continue;
      el.textContent += JSON.parse(d).token;
      el.scrollTop = el.scrollHeight;
    }
  }
  caret.remove();
  panel.classList.add("done");
}

$("f").addEventListener("submit", async (e) => {
  e.preventDefault();
  const topic = $("topic").value.trim();
  if (!topic) return;
  $("go").disabled = true;
  try {
    // sequential on purpose: one small GPU, and the reveal reads better
    await streamInto("base", topic, $("out-base"), document.querySelector(".panel.base"));
    await streamInto("mine", topic, $("out-mine"), document.querySelector(".panel.mine"));
  } finally {
    $("go").disabled = false;
  }
});

// starfield
const stage = document.querySelector(".stage");
for (let i = 0; i < 70; i++) {
  const s = document.createElement("div");
  s.className = "star";
  const z = Math.random() * 2 + 0.6;
  s.style.cssText = `width:${z}px;height:${z}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;animation-delay:${Math.random()*4}s`;
  stage.appendChild(s);
}
</script>
</body>
</html>
